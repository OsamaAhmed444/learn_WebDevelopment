<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8">

<title>HTML & CSS — قريبا</title>
<meta name="description" content="صفحة HTML & CSS - قريبا">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='60' fill='%2338bdf8'>&lt;/&gt;</text></svg>">
<link rel="stylesheet" href="styles.css">
<style>
html,body{height:100%;}
body{display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0f172a 0%,#1e293b 100%);color:#e5e7eb;font-family:'Cairo', 'Almarai', 'Segoe UI',sans-serif;margin:0}
.container{max-width:900px;width:100%;padding:40px;box-sizing:border-box;text-align:center}
.card{background:rgba(30,41,59,0.9);border:1px solid #334155;border-radius:16px;padding:60px 30px}
.title{font-size:56px;color:#38bdf8;margin-bottom:10px}
.badge{display:inline-block;background:#ec4899;color:white;padding:6px 16px;border-radius:20px;font-weight:700;margin-bottom:18px}
.lead{color:#cbd5e1;font-size:18px;margin-bottom:24px}
.note{color:#94a3b8;margin-bottom:18px}
.btn{background:#38bdf8;color:#0f172a;border:none;padding:12px 28px;border-radius:24px;font-weight:700;cursor:pointer}
.btn:focus{outline:2px solid #06b6d4}
.footer-links a{color:#38bdf8;text-decoration:none;margin:0 10px}
@media(max-width:600px){.title{font-size:40px;padding:0 10px}}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <div class="badge">قريبا</div>
    <h1 class="title">HTML & CSS</h1>
    <p class="lead">نحن نعمل على إعداد محتوى مرتب وسهل لتعليم HTML و CSS بالعربية.</p>
    <p class="note">سأضيف الصفحات والدروس قريباً — يمكنك العودة إلى الدورات الحالية أو التحقق لاحقاً.</p>
    <div style="margin-top:18px">
      <button class="btn" onclick="window.location.href='index.html'">العودة للرئيسية</button>
    </div>
    <div style="margin-top:22px;color:#64748b">
      <a href="jspage.html">دورة JavaScript</a> · <a href="react.html" style="color:#38bdf8">React (قريبا)</a>
    </div>
  </div>
</div>
</body>
</html>
